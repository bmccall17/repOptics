name: "Port: Run repOptics Scan"

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository name (e.g. repOptics)"
        required: true
      owner:
        description: "Repository owner (e.g. bmccall17)"
        required: true
        default: "bmccall17"
      port_run_id:
        description: "Port action run ID for callback"
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - run: npm ci

      - name: Run repOptics scanner
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          npx tsx scripts/scan-for-port.ts "${{ inputs.owner }}" "${{ inputs.repo }}" > /tmp/report.json
          echo "Scan output:"
          jq -r '.grade + " (" + (.totalScore|tostring) + "/100)"' /tmp/report.json

          # Extract values for Port
          echo "grade=$(jq -r '.grade' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "totalScore=$(jq -r '.totalScore' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "decisions=$(jq -r '.categories.decisions.score' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "architecture=$(jq -r '.categories.architecture.score' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "governance=$(jq -r '.categories.governance.score' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "delivery=$(jq -r '.categories.delivery.score' /tmp/report.json)" >> "$GITHUB_OUTPUT"
          echo "dependencies=$(jq -r '.categories.dependencies.score' /tmp/report.json)" >> "$GITHUB_OUTPUT"

      - name: Update Port entity with scan results
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: UPSERT
          identifier: ${{ inputs.repo }}
          blueprint: githubRepository
          properties: |
            {
              "repOpticsGrade": "${{ steps.scan.outputs.grade }}",
              "repOpticsScore": ${{ steps.scan.outputs.totalScore }},
              "repOpticsDecisions": ${{ steps.scan.outputs.decisions }},
              "repOpticsArchitecture": ${{ steps.scan.outputs.architecture }},
              "repOpticsGovernance": ${{ steps.scan.outputs.governance }},
              "repOpticsDelivery": ${{ steps.scan.outputs.delivery }},
              "repOpticsDependencies": ${{ steps.scan.outputs.dependencies }},
              "repOpticsScannedAt": "${{ github.event.repository.updated_at }}"
            }

      - name: Report to Port - Success
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: SUCCESS
          logMessage: "✅ Scan complete! ${{ inputs.owner }}/${{ inputs.repo }} scored ${{ steps.scan.outputs.grade }} (${{ steps.scan.outputs.totalScore }}/100)"

      - name: Report to Port - Failure
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: FAILURE
          logMessage: "❌ Scan failed. Check workflow logs for details."
