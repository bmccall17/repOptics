name: Port.io Ocean Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
      PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
      GH_PAT: ${{ secrets.GH_PAT }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
      PORT_BASE_URL: https://api.getport.io
    steps:
      - name: Get Port access token
        id: port_auth
        run: |
          TOKEN=$(curl -s -X POST "$PORT_BASE_URL/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"$PORT_CLIENT_ID\",\"clientSecret\":\"$PORT_CLIENT_SECRET\"}" \
            | jq -r '.accessToken')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Ensure githubRepository blueprint exists
        env:
          PORT_TOKEN: ${{ steps.port_auth.outputs.token }}
        run: |
          curl -s -X POST "$PORT_BASE_URL/v1/blueprints" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "identifier": "githubRepository",
              "title": "GitHub Repository",
              "icon": "Github",
              "schema": {
                "properties": {
                  "url": { "type": "string", "format": "url", "title": "Repository URL" },
                  "language": { "type": "string", "title": "Primary Language" },
                  "defaultBranch": { "type": "string", "title": "Default Branch" },
                  "readme": { "type": "boolean", "title": "Has README" },
                  "openIssues": { "type": "number", "title": "Open Issues" },
                  "stars": { "type": "number", "title": "Stars" },
                  "description": { "type": "string", "title": "Description" },
                  "lastPush": { "type": "string", "format": "date-time", "title": "Last Push" },
                "snykVulnCritical": { "type": "number", "title": "Snyk Critical Vulns" },
                "snykVulnHigh": { "type": "number", "title": "Snyk High Vulns" },
                "snykVulnMedium": { "type": "number", "title": "Snyk Medium Vulns" },
                "snykVulnLow": { "type": "number", "title": "Snyk Low Vulns" },
                "snykVulnTotal": { "type": "number", "title": "Snyk Total Vulns" },
                "snykLastTested": { "type": "string", "format": "date-time", "title": "Snyk Last Scan" },
                "snykMonitored": { "type": "boolean", "title": "Snyk Monitored" }
                }
              }
            }' || true

      - name: Fetch repos and upsert to Port
        env:
          PORT_TOKEN: ${{ steps.port_auth.outputs.token }}
        run: |
          REPOS=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/users/bmccall17/repos?per_page=100&sort=updated")

          echo "$REPOS" | jq -c '.[]' | while read -r repo; do
            NAME=$(echo "$repo" | jq -r '.full_name')
            IDENTIFIER=$(echo "$repo" | jq -r '.name')
            TITLE=$(echo "$repo" | jq -r '.name')
            URL=$(echo "$repo" | jq -r '.html_url')
            LANG=$(echo "$repo" | jq -r '.language // "Unknown"')
            BRANCH=$(echo "$repo" | jq -r '.default_branch')
            ISSUES=$(echo "$repo" | jq -r '.open_issues_count')
            STARS=$(echo "$repo" | jq -r '.stargazers_count')
            DESC=$(echo "$repo" | jq -r '.description // ""')
            PUSHED=$(echo "$repo" | jq -r '.pushed_at')

            # Check if repo has a README
            README_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_PAT" \
              "https://api.github.com/repos/$NAME/readme")
            HAS_README=false
            if [ "$README_CHECK" = "200" ]; then HAS_README=true; fi

            echo "Upserting $NAME..."
            curl -s -X POST "$PORT_BASE_URL/v1/blueprints/githubRepository/entities?upsert=true&merge=true" \
              -H "Authorization: Bearer $PORT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg id "$IDENTIFIER" \
                --arg title "$TITLE" \
                --arg url "$URL" \
                --arg lang "$LANG" \
                --arg branch "$BRANCH" \
                --argjson readme "$HAS_README" \
                --argjson issues "$ISSUES" \
                --argjson stars "$STARS" \
                --arg desc "$DESC" \
                --arg pushed "$PUSHED" \
                '{
                  identifier: $id,
                  title: $title,
                  properties: {
                    url: $url,
                    language: $lang,
                    defaultBranch: $branch,
                    readme: $readme,
                    openIssues: $issues,
                    stars: $stars,
                    description: $desc,
                    lastPush: $pushed
                  }
                }')" | jq -r '.ok // .message'
          done

          echo "GitHub repo sync complete!"

      - name: Enrich entities with Snyk vulnerability data
        if: env.SNYK_TOKEN != '' && env.SNYK_ORG_ID != ''
        env:
          PORT_TOKEN: ${{ steps.port_auth.outputs.token }}
        run: |
          echo "Fetching Snyk projects..."
          SNYK_PROJECTS=$(curl -s \
            -H "Authorization: token $SNYK_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            "https://api.snyk.io/rest/orgs/$SNYK_ORG_ID/projects?version=2024-10-15&limit=100")

          echo "$SNYK_PROJECTS" | jq -c '.data[]' | while read -r project; do
            PROJECT_NAME=$(echo "$project" | jq -r '.attributes.name')
            # Snyk project names: "org/repo:path/to/manifest" — extract just repo name
            REPO_FULL=$(echo "$PROJECT_NAME" | cut -d':' -f1)
            IDENTIFIER=$(echo "$REPO_FULL" | cut -d'/' -f2)

            CRITICAL=$(echo "$project" | jq -r '.attributes.issue_counts_by_severity.critical // 0')
            HIGH=$(echo "$project" | jq -r '.attributes.issue_counts_by_severity.high // 0')
            MEDIUM=$(echo "$project" | jq -r '.attributes.issue_counts_by_severity.medium // 0')
            LOW=$(echo "$project" | jq -r '.attributes.issue_counts_by_severity.low // 0')
            TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))
            LAST_TESTED=$(echo "$project" | jq -r '.attributes.last_tested_date // empty')

            echo "Enriching $REPO_FULL with Snyk data (C:$CRITICAL H:$HIGH M:$MEDIUM L:$LOW)..."
            curl -s -X POST "$PORT_BASE_URL/v1/blueprints/githubRepository/entities?upsert=true&merge=true" \
              -H "Authorization: Bearer $PORT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg id "$IDENTIFIER" \
                --argjson critical "$CRITICAL" \
                --argjson high "$HIGH" \
                --argjson medium "$MEDIUM" \
                --argjson low "$LOW" \
                --argjson total "$TOTAL" \
                --arg lastTested "${LAST_TESTED:-null}" \
                '{
                  identifier: $id,
                  properties: {
                    snykVulnCritical: $critical,
                    snykVulnHigh: $high,
                    snykVulnMedium: $medium,
                    snykVulnLow: $low,
                    snykVulnTotal: $total,
                    snykLastTested: (if $lastTested == "null" then null else $lastTested end),
                    snykMonitored: true
                  }
                }')" | jq -r '.ok // .message'
          done
          echo "Snyk enrichment complete!"

      - name: Create security posture scorecard
        env:
          PORT_TOKEN: ${{ steps.port_auth.outputs.token }}
        run: |
          curl -s -X POST "$PORT_BASE_URL/v1/blueprints/githubRepository/scorecards" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "identifier": "security_posture",
              "title": "Security Posture",
              "levels": [
                { "color": "red", "title": "Basic" },
                { "color": "orange", "title": "Bronze" },
                { "color": "yellow", "title": "Silver" },
                { "color": "green", "title": "Gold" }
              ],
              "rules": [
                {
                  "identifier": "snykMonitored",
                  "title": "Monitored by Snyk",
                  "level": "Bronze",
                  "query": {
                    "combinator": "and",
                    "conditions": [
                      { "property": "snykMonitored", "operator": "=", "value": true }
                    ]
                  }
                },
                {
                  "identifier": "noCriticalVulns",
                  "title": "No Critical Vulnerabilities",
                  "level": "Silver",
                  "query": {
                    "combinator": "and",
                    "conditions": [
                      { "property": "snykVulnCritical", "operator": "=", "value": 0 }
                    ]
                  }
                },
                {
                  "identifier": "noHighVulns",
                  "title": "No High Vulnerabilities",
                  "level": "Gold",
                  "query": {
                    "combinator": "and",
                    "conditions": [
                      { "property": "snykVulnHigh", "operator": "=", "value": 0 }
                    ]
                  }
                }
              ]
            }' || true
          echo "Security scorecard created/updated!"
